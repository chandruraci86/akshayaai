services:
  # 1. PostgreSQL Database
  - type: pgo
    name: jewel-db
    plan: free
    version: 16

  # 2. FastAPI Backend
  - type: web
    name: jewel-api
    plan: free
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jewel-db
          property: connectionString
      - key: RENDER
        value: "true"

  # 3. Vite React Frontend
  - type: web
    name: jewel-frontend
    plan: free
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "./frontend/dist"
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: jewel-api
          property: url
          envVarKey: VITE_API_URL
        # Using a special Render directive to append /api to the URL
        value: "${VITE_API_URL}/api"
